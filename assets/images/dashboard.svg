<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 430" width="580" height="430" role="img" aria-label="Painel do OrbitLink Predict com OrbitScore, grafico de qualidade e status das operacoes">
  <defs>
    <linearGradient id="dbpanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101a3e"/><stop offset="100%" stop-color="#0a1230"/>
    </linearGradient>
    <linearGradient id="dbline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4da3ff"/><stop offset="100%" stop-color="#9b6bff"/>
    </linearGradient>
    <linearGradient id="dbarea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4da3ff" stop-opacity=".35"/><stop offset="100%" stop-color="#4da3ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="578" height="428" rx="18" fill="url(#dbpanel)" stroke="#2a3e7a" stroke-width="1.5"/>

  <!-- barra de janela -->
  <g>
    <circle cx="26" cy="26" r="5" fill="#ff5f57"/><circle cx="44" cy="26" r="5" fill="#febc2e"/><circle cx="62" cy="26" r="5" fill="#28c840"/>
    <rect x="190" y="17" width="200" height="18" rx="9" fill="#0a1230" stroke="#2a3e7a"/>
    <text x="290" y="30" text-anchor="middle" fill="#7e8fc0" font-family="Segoe UI, Arial, sans-serif" font-size="11">app.orbitlink.predict</text>
  </g>
  <line x1="0" y1="50" x2="580" y2="50" stroke="#2a3e7a" stroke-width="1.5"/>

  <!-- card OrbitScore (gauge) -->
  <g transform="translate(24 68)">
    <rect width="244" height="150" rx="14" fill="#0c1638" stroke="#23386f"/>
    <text x="18" y="28" fill="#9fb0d6" font-family="Segoe UI, Arial, sans-serif" font-size="12">OrbitScore</text>
    <g transform="translate(70 95)">
      <path d="M-46 0 A46 46 0 0 1 46 0" fill="none" stroke="#1b2a55" stroke-width="12" stroke-linecap="round"/>
      <path d="M-46 0 A46 46 0 0 1 38 -26" fill="none" stroke="url(#dbline)" stroke-width="12" stroke-linecap="round"/>
      <text x="0" y="2" text-anchor="middle" fill="#eaf1ff" font-family="Orbitron, Segoe UI, sans-serif" font-size="26" font-weight="700">82</text>
    </g>
    <g transform="translate(150 60)">
      <rect width="76" height="26" rx="13" fill="rgba(46,204,113,.15)" stroke="#2ecc71"/>
      <circle cx="16" cy="13" r="4" fill="#2ecc71"/>
      <text x="30" y="17" fill="#7ee2a8" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">ESTAVEL</text>
    </g>
    <text x="150" y="112" fill="#9fb0d6" font-family="Segoe UI, Arial, sans-serif" font-size="11">Risco operacional</text>
    <text x="150" y="128" fill="#9fb0d6" font-family="Segoe UI, Arial, sans-serif" font-size="11">baixo agora</text>
  </g>

  <!-- card grafico Q(t) -->
  <g transform="translate(284 68)">
    <rect width="272" height="150" rx="14" fill="#0c1638" stroke="#23386f"/>
    <text x="18" y="28" fill="#9fb0d6" font-family="Segoe UI, Arial, sans-serif" font-size="12">Qualidade x tempo</text>
    <g transform="translate(18 40)">
      <line x1="0" y1="0" x2="0" y2="90" stroke="#23386f"/>
      <line x1="0" y1="90" x2="236" y2="90" stroke="#23386f"/>
      <path d="M0 6 C60 18 120 58 236 86 L236 90 L0 90 Z" fill="url(#dbarea)"/>
      <path d="M0 6 C60 18 120 58 236 86" fill="none" stroke="url(#dbline)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="6" r="3.5" fill="#4da3ff"/>
      <circle cx="118" cy="40" r="3.5" fill="#7cc4ff"/>
      <circle cx="236" cy="86" r="3.5" fill="#9b6bff"/>
    </g>
  </g>

  <!-- linha de operacoes -->
  <g transform="translate(24 234)">
    <rect width="532" height="172" rx="14" fill="#0c1638" stroke="#23386f"/>
    <text x="18" y="28" fill="#9fb0d6" font-family="Segoe UI, Arial, sans-serif" font-size="12">Operacoes monitoradas</text>

    <g font-family="Segoe UI, Arial, sans-serif">
      <g transform="translate(18 44)">
        <rect width="496" height="34" rx="8" fill="#0a1230"/>
        <circle cx="20" cy="17" r="5" fill="#2ecc71"/>
        <text x="38" y="21" fill="#eaf1ff" font-size="12">Mina Norte — Carajas</text>
        <text x="300" y="21" fill="#9fb0d6" font-size="11">Conectividade alta</text>
        <text x="470" y="21" fill="#7ee2a8" font-size="12" font-weight="700" text-anchor="end">86</text>
      </g>
      <g transform="translate(18 84)">
        <rect width="496" height="34" rx="8" fill="#0a1230"/>
        <circle cx="20" cy="17" r="5" fill="#f1c40f"/>
        <text x="38" y="21" fill="#eaf1ff" font-size="12">Fazenda Cerrado — GO</text>
        <text x="300" y="21" fill="#9fb0d6" font-size="11">Sinal intermitente</text>
        <text x="470" y="21" fill="#f3d27a" font-size="12" font-weight="700" text-anchor="end">58</text>
      </g>
      <g transform="translate(18 124)">
        <rect width="496" height="34" rx="8" fill="#0a1230"/>
        <circle cx="20" cy="17" r="5" fill="#e74c3c"/>
        <text x="38" y="21" fill="#eaf1ff" font-size="12">Linha de Transmissao — AM</text>
        <text x="300" y="21" fill="#9fb0d6" font-size="11">Sem comunicacao</text>
        <text x="470" y="21" fill="#f0a097" font-size="12" font-weight="700" text-anchor="end">31</text>
      </g>
    </g>
  </g>
</svg>
